<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiros passos com DOM</title>
    <style>
        body {
            background-color: lightblue;
            color: white;
            font: normal 18px arial;
        }
    </style>
</head>
<body>
    <h1 class="title">Iniciando estudos DOM</h1>
    <p>Aqui vai o resultado</p>
    <p name="test">Aprendendo a usar o <strong>DOM</strong> em JavaScript</p>
    <div id="msg">Click em mim</div>
        
    <script>
        var p1 = window.document.getElementsByTagName('p')[0]  /* seletor de tag */
        window.document.write('Esta escrito assim: ' + p1.innerText)

        var p2 = window.document.getElementById('msg') /* seletor de ID */
        p2.style.background = 'blue'

        var p3 = window.document.getElementsByName('test')[0]  /* seletor de name */
        p3.style.fontFamily = 'cursive'

        var p4 = window.document.getElementsByClassName('title')[0]  /* seletor de classe */
        p4.style.color = 'green'

        var p5 = window.document.querySelector('div#msg')  /* seletor no id com querySelector */
        var p6 = window.document.querySelector('h1.title')  /* seletor na class com querySelector */
        p5.style.border = '3px solid black'
        p6.style.border = '3px dashed white'
    </script>
</body>
</html>
