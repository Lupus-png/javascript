<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Analisador de Números</h1>
    </header>
    <section>
        <div>
            <label for="numero">Número (entre 1 e 100): <input type="number" name="numero" id="numero"></label>
            <input type="button" value="Adicionar" onclick="adicionar()">
        </div>
        <div>
            <select name="lista" id="lista" size="10">
                <option>Digite um número acima</option>
            </select>
            <p><input type="button" value="Finalizar" onclick="resultados()"></p>
        </div>
        <div id="res">
            
        </div>
    </section>
    <footer>
        <p>@ Lupus-png</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
